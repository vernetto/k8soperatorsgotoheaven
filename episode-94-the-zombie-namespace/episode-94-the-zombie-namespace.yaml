# Episode 94 — "The Zombie Namespace"
# Culprit: Multiple resources with stale finalizers block namespace deletion

---
apiVersion: v1
kind: Namespace
metadata:
  name: zombie-ns
  labels:
    scenario: episode-94
---
# Resources with custom finalizers that will never be cleared
# (simulating a dead operator that no longer processes these finalizers)

apiVersion: v1
kind: ConfigMap
metadata:
  name: config-with-finalizer
  namespace: zombie-ns
  labels:
    scenario: episode-94
  finalizers:
  - cleanup.dead-operator.example.com/config   # ← operator is gone, never cleared
data:
  key: value
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-with-finalizer
  namespace: zombie-ns
  labels:
    scenario: episode-94
  finalizers:
  - cleanup.dead-operator.example.com/serviceaccount   # ← same dead operator
---
# Normal resources (no finalizer — these delete fine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: normal-deployment
  namespace: zombie-ns
  labels:
    scenario: episode-94
spec:
  replicas: 1
  selector:
    matchLabels:
      app: normal
  template:
    metadata:
      labels:
        app: normal
    spec:
      containers:
      - name: app
        image: nginx:stable
