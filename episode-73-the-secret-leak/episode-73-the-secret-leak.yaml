# Episode 73 — "The Secret Leak"
# Culprit: etcd encryption at rest not configured — Secrets stored in plaintext in etcd

---
# A Secret that would be stored in plaintext in etcd (without EncryptionConfiguration)
apiVersion: v1
kind: Secret
metadata:
  name: production-db-credentials
  namespace: default
  labels:
    scenario: episode-73
type: Opaque
stringData:
  username: "db_admin"
  password: "super-secret-production-password"
  connection_string: "postgres://db_admin:super-secret-production-password@db.prod.internal:5432/app"
---
# A pod to demonstrate that secrets are accessible without encryption at rest
apiVersion: v1
kind: Pod
metadata:
  name: secret-reader
  namespace: default
  labels:
    scenario: episode-73
spec:
  containers:
  - name: reader
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== Reading mounted secrets ==="
        echo "Username: $(cat /secrets/username)"
        echo "Password: $(cat /secrets/password)"
        echo ""
        echo "NOTE: Without EncryptionConfiguration on the API server,"
        echo "these values are stored in PLAINTEXT in etcd!"
        sleep 3600
    volumeMounts:
    - name: secret-volume
      mountPath: /secrets
  volumes:
  - name: secret-volume
    secret:
      secretName: production-db-credentials
# DEMONSTRATE the leak in KIND:
#   # Read the secret directly from etcd (bypassing Kubernetes RBAC):
#   docker exec -it kind-control-plane bash
#   ETCDCTL_API=3 etcdctl \
#     --endpoints=https://127.0.0.1:2379 \
#     --cacert=/etc/kubernetes/pki/etcd/ca.crt \
#     --cert=/etc/kubernetes/pki/etcd/server.crt \
#     --key=/etc/kubernetes/pki/etcd/server.key \
#     get /registry/secrets/default/production-db-credentials | strings
#   # You can READ the password in plaintext!
