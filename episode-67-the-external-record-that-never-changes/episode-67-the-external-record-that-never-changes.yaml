# Episode 67 — "The External Record That Never Changes"
# Culprit: ExternalDNS not updating external records — missing annotation on Service

---
# Service WITHOUT the ExternalDNS annotation (the bug)
apiVersion: v1
kind: Service
metadata:
  name: api-loadbalancer
  namespace: default
  labels:
    scenario: episode-67
  # Missing annotation:
  # external-dns.alpha.kubernetes.io/hostname: api.example.com
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
---
# Service WITH the correct ExternalDNS annotation (the fix for comparison)
apiVersion: v1
kind: Service
metadata:
  name: api-loadbalancer-fixed
  namespace: default
  labels:
    scenario: episode-67
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "api-fixed.example.com"   # ← correct
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-67
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: nginx:stable
# EXPECTED:
#   api-loadbalancer: ExternalDNS ignores it (no annotation) — DNS record never created
#   api-loadbalancer-fixed: ExternalDNS creates api-fixed.example.com → LoadBalancer IP
#
# DIAGNOSE (with ExternalDNS installed):
#   kubectl logs -n kube-system -l app=external-dns | grep "api-loadbalancer"
#   # Shows: no changes for api-loadbalancer (annotation missing)
#   # Shows: Creating record for api-fixed.example.com
#
# FIX: Add the annotation to the service missing it:
#   kubectl annotate service api-loadbalancer \
#     external-dns.alpha.kubernetes.io/hostname=api.example.com
