# Episode 78 — "The Secret Store Timeout"
# Culprit: External Secrets Operator can't reach Vault — NetworkPolicy blocks ESO egress

---
apiVersion: v1
kind: Namespace
metadata:
  name: secrets-demo
  labels:
    scenario: episode-78
---
# NetworkPolicy that blocks ALL egress from the secrets-demo namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: secrets-demo
  labels:
    scenario: episode-78
spec:
  podSelector: {}   # applies to all pods in the namespace
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Port 8200 (Vault) is NOT allowed — ESO cannot reach Vault!
---
# Simulated ExternalSecret (requires ESO CRD):
# kubectl apply -f https://github.com/external-secrets/external-secrets/releases/latest/download/install.yaml
#
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: db-credentials
#   namespace: secrets-demo
# spec:
#   refreshInterval: 1m
#   secretStoreRef:
#     name: vault-backend
#     kind: ClusterSecretStore
#   target:
#     name: db-credentials
#   data:
#   - secretKey: password
#     remoteRef:
#       key: secret/production/db
#       property: password

# A pod to verify the external secret was synced
apiVersion: v1
kind: Pod
metadata:
  name: secret-checker
  namespace: secrets-demo
  labels:
    scenario: episode-78
spec:
  containers:
  - name: checker
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Checking if ExternalSecret was synced..."
        if [ -f /secrets/password ]; then
          echo "Secret found: $(cat /secrets/password)"
        else
          echo "ERROR: Secret not mounted — ExternalSecret may not have synced"
        fi
        sleep 3600
    volumeMounts:
    - name: db-secret
      mountPath: /secrets
  volumes:
  - name: db-secret
    secret:
      secretName: db-credentials   # will not exist if ESO can't reach Vault
      optional: true
# DIAGNOSE (with ESO installed):
#   kubectl get externalsecret db-credentials -n secrets-demo
#   # STATUS: SecretSyncedError
#   kubectl describe externalsecret db-credentials -n secrets-demo
#   # "connection refused" or "connection timeout" to Vault
#   kubectl describe networkpolicy default-deny-egress -n secrets-demo
#   # Egress only allows port 53 — Vault on 8200 is blocked!
