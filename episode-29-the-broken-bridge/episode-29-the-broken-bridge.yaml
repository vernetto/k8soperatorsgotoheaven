# Episode 29 — "The Broken Bridge"
# Culprit: Ingress controller not installed — Ingress resources are ignored, 404 for everything

---
# An Ingress resource that will be silently ignored without a controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  namespace: default
  labels:
    scenario: episode-29
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: myapp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-app
            port:
              number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: default
  labels:
    scenario: episode-29
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: app
        image: nginx:stable
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-app
  namespace: default
  labels:
    scenario: episode-29
spec:
  selector:
    app: my-app
  ports:
  - port: 80
    targetPort: 80
# EXPECTED: The Ingress resource exists but nothing handles it
#   curl -H "Host: myapp.example.com" http://<node-ip>   # returns nothing / connection refused
#
# DIAGNOSE:
#   kubectl get ingress                   # shows the ingress
#   kubectl describe ingress my-app-ingress  # no Address assigned
#   kubectl get pods -A | grep ingress    # no ingress controller pod!
#
# FIX: Install an ingress controller, e.g. nginx-ingress for KIND:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
