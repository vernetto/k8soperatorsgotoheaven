# KIND Cluster Configuration for "100 Shades of Kubernetes" Lab
# This creates a 3-node cluster (1 control-plane + 2 workers)
# suitable for episodes that require multi-node scenarios.
#
# Usage:
#   kind create cluster --name k8s-shades --config kind-cluster.yaml
#   kubectl cluster-info --context kind-k8s-shades

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-shades
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "node-type=on-demand,topology.kubernetes.io/zone=zone-a"
  # Expose ports for Ingress Controller (episodes 29, 59, 75, 98)
  extraPortMappings:
  - containerPort: 80
    hostPort: 8080
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    protocol: TCP
  - containerPort: 30080
    hostPort: 30080
    protocol: TCP

- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "node-type=on-demand,topology.kubernetes.io/zone=zone-a"

- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "node-type=spot,topology.kubernetes.io/zone=zone-b"
