# Episode 34 — "The Leaking Pipe"
# Culprit: DB connection leak — pods accumulate open connections until DB refuses new ones

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  labels:
    scenario: episode-34
data:
  DB_MAX_CONNECTIONS: "5"    # ← very low limit to make the leak obvious faster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaky-app
  namespace: default
  labels:
    scenario: episode-34
spec:
  replicas: 3
  selector:
    matchLabels:
      app: leaky-app
  template:
    metadata:
      labels:
        app: leaky-app
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Simulating connection leak: opening connections, never closing..."
            conn_count=0
            while true; do
              conn_count=$((conn_count + 1))
              echo "Opened connection #$conn_count (total open: $conn_count)"
              # In a real leak, each request would open a new DB conn and never close it
              sleep 2
            done
        envFrom:
        - configMapRef:
            name: app-config
---
# Ephemeral container usage for debugging (run after reproducing):
# kubectl debug -it <leaky-pod> --image=nicolaka/netshoot -- bash
# Inside: ss -tn | grep 5432 | wc -l   (count open DB connections)
#
# DIAGNOSE:
#   kubectl top pods   (CPU stays low but open file descriptors grow)
#   kubectl exec <pod> -- cat /proc/1/fd | wc -l   (fd count grows)
#
# FIX: Implement connection pooling (PgBouncer) or fix the app to use
#   a connection pool (HikariCP, pgpool, etc.) that enforces max connections
