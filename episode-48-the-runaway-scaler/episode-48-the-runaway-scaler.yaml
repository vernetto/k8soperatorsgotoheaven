# Episode 48 — "The Runaway Scaler"
# Culprit: Custom metrics HPA receives 0 from dead adapter → scales deployment to minimum

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-processor
  namespace: default
  labels:
    scenario: episode-48
spec:
  replicas: 5
  selector:
    matchLabels:
      app: queue-processor
  template:
    metadata:
      labels:
        app: queue-processor
    spec:
      containers:
      - name: processor
        image: nginx:stable
        resources:
          requests:
            cpu: "100m"
---
# HPA using custom metrics (queue depth)
# When the metrics adapter is down, it returns 0 → HPA scales to minReplicas
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: queue-processor-hpa
  namespace: default
  labels:
    scenario: episode-48
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: queue-processor
  minReplicas: 1
  maxReplicas: 20
  metrics:
  - type: External
    external:
      metric:
        name: rabbitmq_queue_messages_ready
        selector:
          matchLabels:
            queue: orders
      target:
        type: AverageValue
        averageValue: "30"
# EXPECTED: With no metrics adapter installed, HPA will show:
#   kubectl get hpa queue-processor-hpa
#   → TARGETS: <unknown>/30, MINPODS: 1, MAXPODS: 20, REPLICAS: 1 (scales to min)
#
# DIAGNOSE:
#   kubectl describe hpa queue-processor-hpa
#   # "unable to fetch metrics for external metric rabbitmq_queue_messages_ready"
#   kubectl get apiservice v1beta1.external.metrics.k8s.io
#   # Not found or unavailable = metrics adapter missing
#
# FIX:
#   1. Deploy the custom metrics adapter (e.g. kube-prometheus-adapter, KEDA)
#   2. Verify the metric is queryable before deploying the HPA
#   3. Alert on HPA UNKNOWN target state to catch adapter failures early
