#   #     Name              tail
#   #     Mem_Buf_Limit     5MB     ← cap memory buffer
#   #     storage.type      filesystem
#   #   [OUTPUT]
#   #     Name  http
#   #     Rate_Limit 1000/s        ← throttle output rate
