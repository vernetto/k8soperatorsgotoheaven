# Episode 10 — "The Termination That Never Ends"
# Culprit: Shell PID 1 doesn't forward SIGTERM — pod stuck in Terminating for 30 minutes

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v1
  namespace: default
  labels:
    scenario: episode-10
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
      version: v1
  template:
    metadata:
      labels:
        app: api
        version: v1
    spec:
      terminationGracePeriodSeconds: 1800   # ← 30 minutes! SIGKILL won't arrive for a long time
      containers:
      - name: api
        image: busybox:1.36
        # Shell form (PID 1 = sh) — SIGTERM is not forwarded to the child process
        command: ["/bin/sh", "-c", "echo 'App started'; sleep 3600"]
# EXPECTED: When you delete this deployment or trigger a rolling update,
#           old pods will get stuck in Terminating for up to 30 minutes
# REPRODUCE:
#   kubectl delete pod -l app=api,version=v1   # observe: pods stuck Terminating
#   kubectl get pods -w
# DIAGNOSE:
#   kubectl exec <pod> -- ps aux    # PID 1 is /bin/sh, not the app
# FORCE DELETE (emergency):
#   kubectl delete pod <name> --grace-period=0 --force
# FIX: Use exec form in the Dockerfile/command:
#   command: ["sleep", "3600"]    # exec form — PID 1 IS the process
#   And reduce terminationGracePeriodSeconds to a sane value (e.g. 60)
