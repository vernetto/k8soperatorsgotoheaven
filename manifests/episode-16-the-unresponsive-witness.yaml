# Episode 16 — "The Unresponsive Witness"
# Culprit: Readiness probe returns 200 before app is truly ready → 502s during rolling update

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-16
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p /tmp
            # Immediately create the health file (lying about readiness)
            echo "ok" > /tmp/ready
            echo "App started (but DB connections not yet established)..."
            # Simulate slow internal initialization
            sleep 15
            echo "App actually ready now"
            sleep 3600
        readinessProbe:
          exec:
            command: ["cat", "/tmp/ready"]
          initialDelaySeconds: 2
          periodSeconds: 3
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-16
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 8080
# EXPECTED: During rolling update, some requests get 502/connection refused
#   because pods report ready before they can actually handle traffic
