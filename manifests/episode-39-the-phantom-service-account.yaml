# Episode 39 — "The Phantom Service Account"
# Culprit: Pod references a ServiceAccount that doesn't exist → CreateContainerConfigError

---
# The ServiceAccount is intentionally NOT created here
# (simulating someone forgot to include it in the deployment)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-39
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api-service-account   # ← this ServiceAccount does NOT exist
      containers:
      - name: api
        image: nginx:stable
# EXPECTED: Pod fails to start with:
#   Error: pods "api-xxx" is forbidden: error looking up service account
#   default/api-service-account: serviceaccount "api-service-account" not found
#
# DIAGNOSE:
#   kubectl get serviceaccount api-service-account   # not found
#   kubectl describe pod <name>                       # shows the error
#   kubectl get events | grep ServiceAccount
#
# FIX: Create the missing ServiceAccount:
#   kubectl create serviceaccount api-service-account
#   # OR add it to your manifest and apply it first
