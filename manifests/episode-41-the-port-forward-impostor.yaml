# Episode 41 — "The Port Forward Impostor"
# Culprit: Two deployments share overlapping label selectors — Service routes to both

---
# Deployment v1 — the original service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v1
  namespace: default
  labels:
    scenario: episode-41
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
      version: v1
  template:
    metadata:
      labels:
        app: api       # ← both deployments share this label
        version: v1
    spec:
      containers:
      - name: api
        image: busybox:1.36
        command: ["/bin/sh", "-c", "while true; do echo 'Response from V1'; sleep 1; done"]
        ports:
        - containerPort: 8080
---
# Deployment v2 — newly deployed, but Service still hits both
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v2
  namespace: default
  labels:
    scenario: episode-41
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
      version: v2
  template:
    metadata:
      labels:
        app: api       # ← same app label as v1!
        version: v2
    spec:
      containers:
      - name: api
        image: busybox:1.36
        command: ["/bin/sh", "-c", "while true; do echo 'Response from V2'; sleep 1; done"]
        ports:
        - containerPort: 8080
---
# Service that only selects on 'app: api' — hits BOTH v1 and v2 pods
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-41
spec:
  selector:
    app: api          # ← matches all 4 pods (v1 and v2)
    # version: v2    ← missing! Should target only v2
  ports:
  - port: 80
    targetPort: 8080
# EXPECTED: Traffic is split between v1 and v2 pods unpredictably
# DIAGNOSE:
#   kubectl get endpoints api   # shows 4 endpoints (2×v1 + 2×v2)
#   kubectl exec <curl-pod> -- for i in $(seq 1 10); do curl http://api; done
#   # Will see mix of "Response from V1" and "Response from V2"
#
