# Episode 98 — "The Phantom Port-Forward"
# Culprit: kubectl port-forward used in production — single point of failure tied to a laptop

---
# The PRODUCTION deployment that should be accessed via a proper Service/Ingress
apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-api
  namespace: default
  labels:
    scenario: episode-98
spec:
  replicas: 3
  selector:
    matchLabels:
      app: internal-api
  template:
    metadata:
      labels:
        app: internal-api
    spec:
      containers:
      - name: api
        image: nginx:stable
        ports:
        - containerPort: 8080
---
# THE ANTI-PATTERN: A pod that simulates a long-running port-forward
# (in reality a developer has: kubectl port-forward svc/internal-api 8080:8080 & running)
apiVersion: v1
kind: Pod
metadata:
  name: port-forward-simulation
  namespace: default
  labels:
    scenario: episode-98
    type: antipattern
  annotations:
    warning: "This simulates the effect of kubectl port-forward in production"
spec:
  containers:
  - name: forwarder
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== PORT-FORWARD ANTI-PATTERN SIMULATION ==="
        echo ""
        echo "Simulating: kubectl port-forward svc/internal-api 8080:8080"
        echo ""
        echo "PROBLEMS with this approach:"
        echo "1. If this pod/laptop sleeps/disconnects -> ALL traffic to port 8080 dies"
        echo "2. No load balancing — all traffic goes through one tunnel"
        echo "3. No TLS termination"
        echo "4. Not tracked in Git, not reproducible"
        echo "5. If the person who ran this leaves -> mystery outage"
        echo ""
        echo "Uptime: $(uptime)"
        while true; do
          echo "Still forwarding... (if I die, production breaks)"
          sleep 30
        done
---
# THE FIX: Proper Service that survives restarts, scales, and is Git-tracked
apiVersion: v1
kind: Service
metadata:
  name: internal-api
  namespace: default
  labels:
    scenario: episode-98
spec:
  selector:
    app: internal-api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
# And a proper Ingress for external access
# (instead of port-forward from a developer's laptop)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-api-ingress
  namespace: default
  labels:
    scenario: episode-98
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-type: basic   # add auth for internal APIs
spec:
  rules:
  - host: internal-api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: internal-api
            port:
              number: 8080
# REPRODUCE THE FAILURE:
#   kubectl delete pod port-forward-simulation
#   # Observe: anyone depending on the port-forward tunnel is now broken
#   # There is no automatic recovery — someone has to manually restart the tunnel
#
# DIAGNOSE (in real production):
#   ps aux | grep "port-forward"           # running as a background process
#   netstat -tlnp | grep 8080             # bound locally, not via a Service
#   kubectl get service internal-api      # probably doesn't exist!
#
# FIX: Always use Services + Ingress for production traffic.
#   kubectl port-forward is for LOCAL DEVELOPMENT ONLY.
