# Episode 95 — "The Fluentd Memory Spiral"
# Culprit: Fluentd DaemonSet with no memory limit — consumes all node memory → evictions

---
# Fluentd-like log aggregator DaemonSet with NO memory limit
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: kube-system
  labels:
    scenario: episode-95
    k8s-app: fluentd-logging
spec:
  selector:
    matchLabels:
      name: fluentd
  template:
    metadata:
      labels:
        name: fluentd
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      containers:
      - name: fluentd
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Fluentd starting — accumulating log backlog in memory..."
            # Simulate fluentd's in-memory buffer growing without limit
            # when the destination (e.g. Elasticsearch) is slow or down
            BUFFER=""
            while true; do
              # Each iteration adds ~1KB to in-memory buffer (simulating log backlog)
              BUFFER="${BUFFER}$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c1024)"
              BUF_SIZE=${#BUFFER}
              echo "In-memory log buffer: ${BUF_SIZE} bytes"
              sleep 0.5
            done
        resources:
          requests:
            cpu: "100m"
            memory: "200Mi"
          # NO memory LIMIT — THE BUG
          # Fluentd will consume all available node memory when logs back up
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
# EXPECTED: Fluentd pod grows in memory until the node reaches MemoryPressure.
#   Kubelet begins evicting other pods to reclaim memory.
#   The Fluentd pod itself (DaemonSet) gets evicted last and immediately restarts,
#   losing the buffered log data and starting the cycle again.
#
# DIAGNOSE:
#   kubectl top pods -n kube-system | grep fluentd   # growing memory usage
#   kubectl describe node | grep -A5 "MemoryPressure"
#   kubectl get events | grep -i "evict\|pressure"
#
# FIX: Add a memory limit AND configure Fluentd's buffer to use disk instead of memory:
#   resources:
#     limits:
#       memory: "512Mi"   ← hard cap; OOMKilled before it evicts neighbors
#   # In fluentd.conf:
#   <buffer>
#     @type file              ← use disk-backed buffer
#     path /var/log/fluentd-buffers
#     total_limit_size 512MB  ← cap disk usage too
#   </buffer>
