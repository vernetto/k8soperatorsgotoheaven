# Episode 80 — "The ReadinessGate"
# Culprit: Pod has a ReadinessGate condition that is never set — pod stays 0/1 Ready

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-80
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      readinessGates:
      - conditionType: "feature-gate.example.com/load-balancer-ready"
        # ← this custom condition is NEVER set by any controller
        # Pod waits for it forever and never becomes Ready for traffic
      containers:
      - name: api
        image: nginx:stable
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-80
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
# EXPECTED: Pod containers are healthy (nginx is running), readiness probe passes,
#   but pod shows 0/1 READY because the ReadinessGate condition is never satisfied
#
# DIAGNOSE:
#   kubectl get pods -l app=api   # shows: READY 0/1, STATUS Running
#   kubectl describe pod <name>
#   # Conditions section shows:
#   #   feature-gate.example.com/load-balancer-ready: False (or missing)
#   kubectl get endpoints api    # shows: <none> — pod not added to service!
#
# FIX option 1: Remove the ReadinessGate if no controller manages it:
#   Remove the readinessGates section from the pod spec
#
# FIX option 2: Deploy the controller that sets the condition:
#   kubectl patch pod <name> --subresource=status --type=json \
#     -p='[{"op":"add","path":"/status/conditions/-",
#           "value":{"type":"feature-gate.example.com/load-balancer-ready",
#                    "status":"True"}}]'
