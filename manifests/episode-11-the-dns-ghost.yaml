# Episode 11 — "The DNS Ghost"
# Culprit: CoreDNS crashes → cluster-internal DNS broken for all pods

---
# A client pod that tries to resolve service names
apiVersion: v1
kind: Pod
metadata:
  name: dns-client
  namespace: default
  labels:
    scenario: episode-11
spec:
  containers:
  - name: client
    image: busybox:1.36
    command: ["sleep", "3600"]
---
# A simple service to try to resolve
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: default
  labels:
    scenario: episode-11
spec:
  selector:
    app: nonexistent
  ports:
  - port: 80
# ─────────────────────────────────────────────────────────────────
# To SIMULATE CoreDNS failure (run AFTER applying this manifest):
#
#   # Scale CoreDNS to 0
#   kubectl scale deployment coredns -n kube-system --replicas=0
#
# REPRODUCE the issue:
#   kubectl exec dns-client -- nslookup my-service    # hangs / times out
#   kubectl exec dns-client -- nslookup kubernetes    # also fails
#
# DIAGNOSE:
#   kubectl get pods -n kube-system | grep coredns
#   kubectl logs -n kube-system -l k8s-app=kube-dns --previous
#
# FIX:
#   kubectl scale deployment coredns -n kube-system --replicas=2
#   # Or investigate and fix the CoreDNS crash root cause
