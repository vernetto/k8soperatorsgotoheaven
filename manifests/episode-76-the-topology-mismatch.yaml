# Episode 76 — "The Topology Mismatch"
# Culprit: Service topology routing misconfigured — cross-zone latency / data sovereignty issues

---
# Service WITHOUT topology-aware routing (all traffic may cross zones)
apiVersion: v1
kind: Service
metadata:
  name: api-no-topology
  namespace: default
  labels:
    scenario: episode-76
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
  # No topologyKeys or trafficDistribution — traffic goes to any pod in any zone
---
# Service WITH topology-aware routing (prefer same zone)
apiVersion: v1
kind: Service
metadata:
  name: api-topology-aware
  namespace: default
  labels:
    scenario: episode-76
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
  trafficDistribution: PreferClose   # ← prefer same zone (Kubernetes 1.31+)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-76
spec:
  replicas: 6
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            NODE=$(cat /etc/nodename 2>/dev/null || hostname)
            ZONE=$(cat /etc/zone 2>/dev/null || echo "unknown")
            while true; do
              echo "Serving from node=$NODE zone=$ZONE"
              sleep 60
            done
        ports:
        - containerPort: 80
# SIMULATE multi-zone in KIND:
#   kubectl label node kind-worker  topology.kubernetes.io/zone=eu-west-1a
#   kubectl label node kind-worker2 topology.kubernetes.io/zone=eu-west-1b
#
# DIAGNOSE cross-zone traffic:
#   # Without topology routing: requests from zone-a can land on pods in zone-b
#   # This causes: higher latency, cross-zone egress costs, data sovereignty issues
#
#   kubectl get endpoints api-topology-aware -o json \
#     | jq '.subsets[].addresses[] | {ip, nodeName}'
#
# FIX: Use trafficDistribution: PreferClose or configure topology hints
