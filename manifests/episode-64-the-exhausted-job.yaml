# Episode 64 — "The Exhausted Job"
# Culprit: Job backoffLimit exhausted — job marked Failed with no alert

---
apiVersion: batch/v1
kind: Job
metadata:
  name: data-importer
  namespace: default
  labels:
    scenario: episode-64
spec:
  backoffLimit: 3    # ← after 3 failures, job is marked Failed and gives up
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: importer
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting data import..."
            sleep 2
            echo "ERROR: Cannot connect to upstream API: connection refused" >&2
            exit 1   # ← always fails
# EXPECTED: Job creates 4 pods (1 + 3 retries), all fail, job status becomes Failed
#   No alert fires (no monitoring configured)
#
# DIAGNOSE:
#   kubectl get job data-importer        # shows: COMPLETIONS 0/1, STATUS Failed
#   kubectl describe job data-importer   # shows backoffLimit exceeded
#   kubectl get pods -l job-name=data-importer   # shows 4 pods, all Failed
#   kubectl logs -l job-name=data-importer --prefix   # shows the error
#
