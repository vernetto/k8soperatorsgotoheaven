# Episode 65 — "The New Node's Rejection"
# Culprit: New node has a taint that existing DaemonSet doesn't tolerate — DaemonSet pods not scheduled

---
# A DaemonSet without tolerations for a custom node taint
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: default
  labels:
    scenario: episode-65
spec:
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      # Missing toleration for the new node's taint
      # tolerations:
      # - key: "team"
      #   operator: "Equal"
      #   value: "ml-team"
      #   effect: "NoSchedule"
      containers:
      - name: collector
        image: busybox:1.36
        command: ["sleep", "3600"]
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
# REPRODUCE (in a multi-node KIND cluster):
#   # Add a taint to one worker node (simulating a new node with a custom taint):
#   kubectl taint nodes kind-worker2 team=ml-team:NoSchedule
#
#   # Apply the DaemonSet:
#   kubectl apply -f episode-65-the-new-nodes-rejection.yaml
#
#   # Observe: DaemonSet pod is NOT on kind-worker2
#   kubectl get pods -l app=log-collector -o wide
#
# DIAGNOSE:
#   kubectl describe daemonset log-collector | grep -i "taint\|tolerati"
#   kubectl describe node kind-worker2 | grep Taints
#   kubectl get pods -l app=log-collector -o wide   # missing from kind-worker2
#
# FIX: Add the toleration to the DaemonSet:
#   tolerations:
#   - key: "team"
#     operator: "Equal"
#     value: "ml-team"
#     effect: "NoSchedule"
