#     selector:
#       matchLabels:
#         app: api
#         version: v2   # ← CHANGED selector — immutable!
#     template:
#       metadata:
#         labels:
#           app: api
#           version: v2
#       spec:
#         containers:
#         - name: api
#           image: nginx:1.25-alpine
#   V2
#   # Error: The Deployment "api" is invalid: spec.selector: Invalid value: ... field is immutable
#
# DIAGNOSE:
#   helm upgrade api ./chart   # shows: "cannot patch Deployment ... field is immutable"
#
# FIX: Delete and recreate the Deployment (brief downtime), or use --force in Helm:
#   helm upgrade api ./chart --force   # deletes and recreates the resource
#   # OR: kubectl delete deployment api && helm upgrade api ./chart
#   # PREVENTION: Never include dynamic values in spec.selector
