# Episode 71 — "The Helm Freeze"
# Culprit: Helm upgrade changes an immutable field (spec.selector) — upgrade fails

---
# Initial Helm-managed Deployment (simulate with kubectl)
# Version 1 — original labels
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-71
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: api-1.0.0
  annotations:
    meta.helm.sh/release-name: api
    meta.helm.sh/release-namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
      version: v1   # ← THIS IS THE IMMUTABLE FIELD — cannot be changed after creation
  template:
    metadata:
      labels:
        app: api
        version: v1
    spec:
      containers:
      - name: api
        image: nginx:1.24-alpine
# REPRODUCE:
#   kubectl apply -f episode-71-the-helm-freeze.yaml
#
