# Episode 97 — "The Service Account Token Thief"
# Culprit: automountServiceAccountToken not disabled — every pod gets API access by default

---
# The INSECURE default: every pod gets a mounted ServiceAccount token
# that can be used to call the Kubernetes API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    scenario: episode-97
    security: insecure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # automountServiceAccountToken is TRUE by default — no opt-out here
      containers:
      - name: frontend
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "=== ServiceAccount token is auto-mounted ==="
            ls -la /var/run/secrets/kubernetes.io/serviceaccount/
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            echo "Token (first 50 chars): ${TOKEN:0:50}..."
            echo ""
            echo "=== Using token to call Kubernetes API ==="
            # This works! Any compromised pod can enumerate the cluster
            curl -s --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              -H "Authorization: Bearer $TOKEN" \
              https://kubernetes.default.svc.cluster.local/api/v1/namespaces/default/secrets \
              2>/dev/null | grep -o '"name":"[^"]*"' | head -5
            echo "(above: list of secrets accessible from this pod)"
            sleep 3600
---
# The SECURE version: opt out of auto-mounting
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-secure
  namespace: default
  labels:
    scenario: episode-97
    security: secure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-secure
  template:
    metadata:
      labels:
        app: frontend-secure
    spec:
      automountServiceAccountToken: false   # ← explicitly opt out
      containers:
      - name: frontend
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "=== No ServiceAccount token mounted ==="
            ls /var/run/secrets/ 2>/dev/null || echo "No secrets mounted — secure!"
            sleep 3600
# REPRODUCE:
#   kubectl apply -f episode-97-the-service-account-token-thief.yaml
#   kubectl logs -l app=frontend          # can list secrets!
#   kubectl logs -l app=frontend-secure   # cannot — no token
#
# DIAGNOSE:
#   kubectl get pods -l scenario=episode-97 -o json | \
#     jq '.items[] | {name: .metadata.name, automount: .spec.automountServiceAccountToken}'
#
# FIX: Apply at namespace or ServiceAccount level:
#   # Disable for all pods in a namespace via the ServiceAccount:
#   kubectl patch serviceaccount default -p '{"automountServiceAccountToken": false}'
#   # Only re-enable for pods that specifically need API access
