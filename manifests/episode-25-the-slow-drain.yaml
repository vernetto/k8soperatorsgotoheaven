# Episode 25 — "The Slow Drain"
# Culprit: No preStop hook — LB sends traffic to pods that are already terminating

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-25
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: api
        image: nginx:stable
        ports:
        - containerPort: 80
        # No preStop hook — Kubernetes removes the pod from endpoints
        # and sends SIGTERM AT THE SAME TIME.
        # The load balancer may still route traffic to the pod for a few seconds.
        # This causes 502/connection errors during rolling updates.
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
  labels:
    scenario: episode-25
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
