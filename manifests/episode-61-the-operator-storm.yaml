# Episode 61 — "The Operator Storm"
# Culprit: Operator reconcile loop triggered by its own annotation changes — infinite CPU storm

---
# Simulate an operator that modifies the resources it watches,
# triggering re-reconciliation indefinitely.
# We model this with a CronJob that keeps patching a ConfigMap
# (simulating a non-idempotent operator).

apiVersion: v1
kind: ConfigMap
metadata:
  name: watched-resource
  namespace: default
  labels:
    scenario: episode-61
    managed-by: episode-61-operator
data:
  config: "initial-value"
---
# "Operator" simulation: patches the ConfigMap every few seconds,
# adding a timestamp annotation (non-idempotent!)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-operator
  namespace: default
  labels:
    scenario: episode-61
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-operator
  template:
    metadata:
      labels:
        app: fake-operator
    spec:
      serviceAccountName: fake-operator-sa
      containers:
      - name: operator
        image: bitnami/kubectl:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Operator started — reconciling every second (storm simulation)..."
            while true; do
              TS=$(date +%s)
              # Non-idempotent: always adds a changing annotation → always triggers re-watch
              kubectl annotate configmap watched-resource \
                last-reconciled="$TS" --overwrite
              echo "Reconciled at $TS"
              # No sleep — infinite tight loop!
            done
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fake-operator-sa
  namespace: default
  labels:
    scenario: episode-61
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fake-operator-role
  namespace: default
  labels:
    scenario: episode-61
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fake-operator-rolebinding
  namespace: default
  labels:
    scenario: episode-61
subjects:
- kind: ServiceAccount
  name: fake-operator-sa
  namespace: default
roleRef:
  kind: Role
  name: fake-operator-role
  apiGroup: rbac.authorization.k8s.io
