# Episode 68 — "The KEDA Ghost"
# Culprit: KEDA ScaledObject points to a deleted queue — workload scales to 0 despite work pending

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: default
  labels:
    scenario: episode-68
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-processor
  template:
    metadata:
      labels:
        app: order-processor
    spec:
      containers:
      - name: processor
        image: busybox:1.36
        command: ["sleep", "3600"]
        resources:
          requests:
            cpu: "50m"
---
# KEDA ScaledObject pointing to a RabbitMQ queue that no longer exists
# Requires KEDA to be installed: https://keda.sh/docs/latest/deploy/
#
# kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.13.0/keda-2.13.0.yaml
#
# Then apply this ScaledObject:
#
#   apiVersion: keda.sh/v1alpha1
#   kind: ScaledObject
#   metadata:
#     name: order-processor-scaler
#     namespace: default
#   spec:
#     scaleTargetRef:
#       name: order-processor
#     minReplicaCount: 0
#     maxReplicaCount: 20
#     triggers:
#     - type: rabbitmq
#       metadata:
#         protocol: amqp
#         queueName: orders-deleted-queue   # ← this queue was deleted!
#         host: amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672/
#
# EXPECTED: KEDA cannot read queue depth (queue doesn't exist or RabbitMQ unreachable)
#   → reports 0 messages → scales deployment to 0
#   Orders are accumulating in a new queue, but nobody is processing them
#
# DIAGNOSE:
#   kubectl get scaledobject order-processor-scaler
#   # READY=False or shows 0 replicas despite expected work
#   kubectl describe scaledobject order-processor-scaler
#   # "unable to get external metric ... queue not found"
#
# FIX: Update the ScaledObject to point to the correct queue name
#   OR recreate the deleted queue
