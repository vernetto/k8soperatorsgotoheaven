# Episode 07 — "The Overzealous Guard"
# Culprit: Liveness probe too aggressive — kills healthy pod during startup

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-starting-api
  namespace: default
  labels:
    scenario: episode-07
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-starting-api
  template:
    metadata:
      labels:
        app: slow-starting-api
    spec:
      containers:
      - name: api
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Application starting up (takes 30 seconds)..."
            sleep 30
            echo "Ready! Starting HTTP server..."
            # After 30s, create the health file
            mkdir -p /tmp
            echo "ok" > /tmp/healthy
            sleep 3600
        livenessProbe:
          exec:
            command: ["cat", "/tmp/healthy"]
          initialDelaySeconds: 5   # ← probe starts way too early
          periodSeconds: 5
          failureThreshold: 2      # ← only 2 failures before kill
        readinessProbe:
          exec:
            command: ["cat", "/tmp/healthy"]
          initialDelaySeconds: 5
          periodSeconds: 5
# EXPECTED: Pod restarts repeatedly — liveness probe kills it before app is ready
# DIAGNOSE:
#   kubectl describe pod <name>   # look for "Liveness probe failed"
#   kubectl get pod <name> -w     # watch restart count climb
# FIX: Add startupProbe, or increase initialDelaySeconds to 40+
