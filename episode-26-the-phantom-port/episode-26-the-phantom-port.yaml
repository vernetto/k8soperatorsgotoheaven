# Episode 26 — "The Phantom Port"
# Culprit: Service targetPort doesn't match container's actual listening port

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    scenario: episode-26
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:stable
        ports:
        - containerPort: 80     # ← nginx actually listens on port 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
  labels:
    scenario: episode-26
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8080    # ← WRONG! Container listens on 80, not 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: default
  labels:
    scenario: episode-26
spec:
  containers:
  - name: client
    image: curlimages/curl:8.5.0
    command: ["sleep", "3600"]
# EXPECTED: Service has endpoints (pods are healthy), but curl hangs / connection refused
# DIAGNOSE:
#   kubectl get endpoints backend      # endpoints exist (pods are healthy)
#   kubectl exec client -- curl http://backend   # connection refused
#   kubectl describe service backend   # TargetPort: 8080
#   kubectl exec <pod> -- ss -tlnp | grep LISTEN   # shows port 80
#
# FIX: Correct the targetPort:
#   targetPort: 80
