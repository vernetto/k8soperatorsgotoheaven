# Episode 84 — "The Certificate Authority Chain"
# Culprit: Webhook using self-signed cert — caBundle empty or wrong → TLS verify failure

---
# A ValidatingWebhook with an empty caBundle
# (Real webhook server with valid cert but caBundle not configured)
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: episode-84-custom-webhook
  labels:
    scenario: episode-84
webhooks:
- name: validate.episode84.example.com
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: webhook-service
      namespace: default
      path: /validate
    caBundle: ""   # ← EMPTY! API server cannot verify the webhook's TLS cert
  rules:
  - apiGroups: ["apps"]
    apiVersions: ["v1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["deployments"]
  namespaceSelector:
    matchLabels:
      episode-84-test: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: webhook-test-84
  labels:
    scenario: episode-84
    episode-84-test: "true"
---
# The webhook service (no actual server behind it for this demo)
apiVersion: v1
kind: Service
metadata:
  name: webhook-service
  namespace: default
  labels:
    scenario: episode-84
spec:
  selector:
    app: webhook-server
  ports:
  - port: 443
    targetPort: 8443
