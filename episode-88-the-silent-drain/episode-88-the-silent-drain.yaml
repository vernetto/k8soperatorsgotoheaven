# Episode 88 — "The Silent Drain"
# Culprit: Bare pod (no owner) blocks kubectl drain indefinitely

---
# A Deployment-managed pod (drains fine — gets rescheduled)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: managed-app
  namespace: default
  labels:
    scenario: episode-88
spec:
  replicas: 2
  selector:
    matchLabels:
      app: managed-app
  template:
    metadata:
      labels:
        app: managed-app
    spec:
      containers:
      - name: app
        image: nginx:stable
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
---
# A BARE POD — no ownerReference, no Deployment, no ReplicaSet
# kubectl drain will refuse to evict this pod unless --force is used
apiVersion: v1
kind: Pod
metadata:
  name: bare-pod-legacy-script
  namespace: default
  labels:
    scenario: episode-88
    type: bare-pod
spec:
  containers:
  - name: legacy
    image: busybox:1.36
    command: ["sleep", "3600"]
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
---
# Another bare pod simulating an old debug session never cleaned up
apiVersion: v1
kind: Pod
metadata:
  name: bare-pod-old-debug
  namespace: default
  labels:
    scenario: episode-88
    type: bare-pod
spec:
  containers:
  - name: debug
    image: busybox:1.36
    command: ["sleep", "3600"]
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
