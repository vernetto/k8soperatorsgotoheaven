# Episode 05 — "The Invisible Wall"
# Culprit: NetworkPolicy blocking inter-pod communication

---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    scenario: episode-05
---
# Frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: curlimages/curl:8.5.0
        command: ["sleep", "3600"]
---
# Backend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:stable
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: production
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 80
---
# NetworkPolicy that BLOCKS all ingress to backend (the bug)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-deny-all
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress: []   # ← empty = deny all ingress
# EXPECTED: curl from frontend pod to backend service times out / connection refused
# DIAGNOSE:
#   kubectl exec -n production deploy/frontend -- curl -v http://backend
#   kubectl describe networkpolicy -n production
